<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}OmniMapping Dashboard{% endblock %}</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f4f6f8;
      --panel: #ffffff;
      --panel-soft: #f9fafb;
      --border: #d7dde5;
      --border-strong: #b8c2cf;
      --text: #16202b;
      --muted: #66717f;
      --muted-strong: #465261;
      --accent: #146b85;
      --accent-strong: #0b5066;
      --green: #13795b;
      --green-bg: #e9f7f1;
      --amber: #946200;
      --amber-bg: #fff5df;
      --red: #b42318;
      --red-bg: #fff1f0;
      --blue-bg: #eaf4f8;
      --score: #153e75;
      --shadow: 0 1px 2px rgba(20, 33, 51, 0.06);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      line-height: 1.45;
      font-size: 15px;
    }
    a { color: var(--accent-strong); text-decoration: none; }
    a:hover { text-decoration: underline; }
    header {
      background: #ffffff;
      border-bottom: 1px solid var(--border);
      padding: 12px 24px;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      max-width: 1280px;
      margin: 0 auto;
    }
    .brand { font-size: 18px; font-weight: 800; letter-spacing: 0; }
    nav { display: flex; gap: 14px; flex-wrap: wrap; }
    nav a {
      color: var(--muted-strong);
      font-weight: 700;
      padding: 6px 8px;
      border-radius: 6px;
    }
    nav a:hover { background: var(--panel-soft); text-decoration: none; color: var(--text); }
    main {
      max-width: 1280px;
      margin: 0 auto;
      padding: 22px 24px 34px;
    }
    .page-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
      margin-bottom: 16px;
    }
    h1, h2, h3 { margin: 0; line-height: 1.2; }
    h1 { font-size: 26px; }
    h2 { font-size: 19px; margin-bottom: 10px; }
    h3 { font-size: 15px; margin-bottom: 8px; }
    .muted { color: var(--muted); }
    .page-kicker {
      color: var(--muted);
      font-weight: 700;
      font-size: 12px;
      margin-bottom: 4px;
      text-transform: uppercase;
    }
    .actions { display: flex; gap: 8px; flex-wrap: wrap; justify-content: flex-end; align-items: center; }
    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 36px;
      padding: 8px 12px;
      border: 1px solid var(--border);
      background: #ffffff;
      color: var(--text);
      font-weight: 700;
      border-radius: 6px;
      cursor: pointer;
      box-shadow: var(--shadow);
      text-align: center;
    }
    .button:hover { text-decoration: none; border-color: var(--border-strong); }
    .button.primary {
      background: var(--accent-strong);
      border-color: var(--accent-strong);
      color: #ffffff;
    }
    .button.secondary {
      border-color: var(--accent);
      color: var(--accent-strong);
    }
    .button.small {
      min-height: 30px;
      padding: 5px 9px;
      font-size: 13px;
    }
    .filters {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px;
      margin-bottom: 16px;
      box-shadow: var(--shadow);
    }
    form.grid {
      display: grid;
      grid-template-columns: minmax(220px, 1.4fr) repeat(6, minmax(120px, 1fr)) auto;
      gap: 10px;
      align-items: end;
    }
    .filter-actions {
      display: flex;
      gap: 8px;
      align-items: end;
      flex-wrap: wrap;
    }
    label {
      display: block;
      font-size: 12px;
      color: var(--muted-strong);
      font-weight: 700;
      margin-bottom: 5px;
      text-transform: uppercase;
    }
    select, input, textarea {
      width: 100%;
      min-height: 38px;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 7px 9px;
      background: #ffffff;
      color: var(--text);
      font: inherit;
    }
    textarea { resize: vertical; }
    table {
      width: 100%;
      border-collapse: collapse;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      box-shadow: var(--shadow);
    }
    th, td {
      padding: 11px 12px;
      border-bottom: 1px solid var(--border);
      text-align: left;
      vertical-align: top;
    }
    th {
      font-size: 12px;
      text-transform: uppercase;
      color: var(--muted);
      background: #eef2f6;
      letter-spacing: 0;
    }
    tbody tr:hover { background: #fbfcfd; }
    tr:last-child td { border-bottom: 0; }
    .primary-cell { min-width: 220px; }
    .wide-cell { min-width: 260px; }
    .score {
      color: var(--score);
      font-weight: 800;
      white-space: nowrap;
    }
    .score-chip {
      display: inline-flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 1px;
      min-width: 78px;
      padding: 7px 8px;
      border-radius: 7px;
      border: 1px solid var(--border);
      background: var(--panel-soft);
      color: var(--text);
      white-space: nowrap;
    }
    .score-chip strong { font-size: 17px; line-height: 1; }
    .score-chip span { font-size: 11px; color: var(--muted); font-weight: 700; }
    .score-chip.positive { border-color: #9fd8c3; background: var(--green-bg); color: var(--green); }
    .score-chip.review { border-color: #e3c36f; background: var(--amber-bg); color: var(--amber); }
    .score-chip.warning { border-color: #f0b4ad; background: var(--red-bg); color: var(--red); }
    .nowrap { white-space: nowrap; }
    .subtle {
      display: block;
      color: var(--muted);
      font-size: 13px;
      margin-top: 2px;
    }
    .pill {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 8px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: #f9fafb;
      color: var(--muted-strong);
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }
    .pill.positive { border-color: #9fd8c3; background: var(--green-bg); color: var(--green); }
    .pill.review, .pill.warn { border-color: #e3c36f; background: var(--amber-bg); color: var(--amber); }
    .pill.warning { border-color: #f0b4ad; background: var(--red-bg); color: var(--red); }
    .pill.neutral { border-color: var(--border); background: var(--panel-soft); color: var(--muted-strong); }
    .pill-row { display: flex; gap: 5px; flex-wrap: wrap; align-items: center; }
    .status-line { margin-top: 8px; }
    .layout {
      display: grid;
      grid-template-columns: minmax(0, 2fr) minmax(280px, 1fr);
      gap: 18px;
      align-items: start;
    }
    .section {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 16px;
      box-shadow: var(--shadow);
      overflow-wrap: anywhere;
    }
    .section-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 12px;
    }
    .review-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.4fr) minmax(300px, 0.8fr);
      gap: 14px;
      align-items: start;
    }
    .review-form {
      display: grid;
      gap: 10px;
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--panel-soft);
    }
    .review-form .button { justify-self: start; }
    .scan-strip {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 10px;
      margin-bottom: 16px;
    }
    .scan-item {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
      box-shadow: var(--shadow);
    }
    .scan-item.positive { border-left: 4px solid var(--green); }
    .scan-item.review { border-left: 4px solid var(--amber); }
    .scan-item.warning { border-left: 4px solid var(--red); }
    .scan-item.info { border-left: 4px solid var(--accent); }
    .scan-item strong {
      display: block;
      font-size: 24px;
      line-height: 1.1;
      margin-top: 2px;
    }
    .gap-note {
      border-left: 4px solid var(--amber);
      background: var(--amber-bg);
      padding: 10px 12px;
      margin: 10px 0;
      color: #5f3d00;
    }
    .gap-note.neutral {
      border-left-color: var(--border-strong);
      background: var(--panel-soft);
      color: var(--muted-strong);
    }
    .action-cell {
      min-width: 142px;
    }
    .action-stack { display: flex; gap: 6px; flex-wrap: wrap; }
    .metrics {
      display: grid;
      grid-template-columns: repeat(3, minmax(120px, 1fr));
      gap: 10px;
    }
    .metric {
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
      background: #fbfcfd;
      min-width: 0;
    }
    .metric strong { display: block; font-size: 22px; }
    .breakdown {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }
    .breakdown-row {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 6px;
    }
    .chain-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(270px, 1fr));
      gap: 12px;
      margin-bottom: 16px;
    }
    .chain-card {
      display: flex;
      flex-direction: column;
      gap: 12px;
      min-height: 275px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px;
      box-shadow: var(--shadow);
    }
    .chain-card:hover { border-color: var(--border-strong); }
    .chain-card-head {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: flex-start;
    }
    .chain-card h2 { font-size: 18px; margin-bottom: 4px; }
    .mini-flow {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 6px;
      align-items: stretch;
    }
    .mini-step {
      min-height: 48px;
      border: 1px solid var(--border);
      border-radius: 7px;
      background: #fbfcfd;
      padding: 7px;
      color: var(--muted-strong);
      font-size: 12px;
      font-weight: 800;
      text-align: center;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .chain-company-list {
      display: grid;
      gap: 6px;
      margin-top: auto;
    }
    .chain-company {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: flex-start;
      border-top: 1px solid var(--border);
      padding-top: 7px;
      min-width: 0;
    }
    .chain-company a { font-weight: 800; }
    .chain-flow {
      display: grid;
      grid-template-columns: repeat(4, minmax(230px, 1fr));
      gap: 12px;
      align-items: stretch;
      overflow-x: auto;
      padding-bottom: 4px;
    }
    .flow-step {
      position: relative;
      min-width: 230px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--panel);
      padding: 14px;
      box-shadow: var(--shadow);
    }
    .flow-step:not(:last-child)::after {
      content: ">";
      position: absolute;
      top: 42px;
      right: -11px;
      width: 20px;
      height: 20px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: #ffffff;
      color: var(--accent-strong);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
      z-index: 1;
    }
    .flow-step-number {
      width: 28px;
      height: 28px;
      border-radius: 999px;
      background: var(--accent-strong);
      color: #ffffff;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
      margin-bottom: 8px;
    }
    .flow-step h2 { font-size: 17px; margin-bottom: 4px; }
    .opportunity-note {
      border-left: 4px solid var(--accent);
      background: var(--blue-bg);
      padding: 9px 10px;
      color: var(--muted-strong);
      margin: 10px 0;
    }
    .company-opportunity-list {
      display: grid;
      gap: 8px;
    }
    .company-opportunity {
      border: 1px solid var(--border);
      border-radius: 8px;
      background: #fbfcfd;
      padding: 10px;
    }
    .company-opportunity-head {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      align-items: flex-start;
    }
    .action-queue {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 10px;
    }
    .queue-item {
      border: 1px solid var(--border);
      border-radius: 8px;
      background: #fbfcfd;
      padding: 12px;
      min-width: 0;
    }
    .queue-main {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
      min-width: 0;
    }
    .queue-main h3 { margin-bottom: 2px; }
    .queue-metrics {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 6px;
      margin-top: 10px;
    }
    .queue-metrics span {
      border: 1px solid var(--border);
      border-radius: 7px;
      background: #ffffff;
      padding: 7px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }
    .queue-metrics strong {
      display: block;
      color: var(--text);
      font-size: 16px;
    }
    .map-layout {
      display: grid;
      grid-template-columns: minmax(0, 1.8fr) minmax(300px, 0.8fr);
      gap: 16px;
      align-items: start;
    }
    .map-shell {
      position: relative;
      min-height: 620px;
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      background:
        linear-gradient(90deg, rgba(20, 107, 133, 0.08) 1px, transparent 1px),
        linear-gradient(rgba(20, 107, 133, 0.08) 1px, transparent 1px),
        linear-gradient(160deg, #f9fbf8 0%, #eef6f0 47%, #e8f1f5 100%);
      background-size: 8.33% 100%, 100% 12.5%, 100% 100%;
      box-shadow: var(--shadow);
    }
    .map-shell::before {
      content: "";
      position: absolute;
      inset: 7% 5% 8% 6%;
      border: 2px solid rgba(20, 107, 133, 0.2);
      border-radius: 47% 39% 44% 34%;
      transform: rotate(-4deg);
      background: rgba(255, 255, 255, 0.28);
    }
    .map-axis-label {
      position: absolute;
      color: rgba(70, 82, 97, 0.72);
      font-size: 12px;
      font-weight: 800;
      text-transform: uppercase;
      pointer-events: none;
    }
    .map-axis-label.nw { top: 14px; left: 16px; }
    .map-axis-label.se { right: 16px; bottom: 12px; }
    .map-marker {
      position: absolute;
      width: var(--marker-size);
      height: var(--marker-size);
      border-radius: 999px;
      border: 2px solid #ffffff;
      transform: translate(-50%, -50%);
      box-shadow: 0 2px 8px rgba(22, 32, 43, 0.25);
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: #ffffff;
      font-size: 11px;
      font-weight: 900;
      padding: 0;
    }
    .map-marker:hover, .map-marker.active { outline: 3px solid rgba(11, 80, 102, 0.25); z-index: 5; }
    .map-marker.company { border-radius: 999px; }
    .map-marker.site { border-radius: 6px; }
    .map-marker.rail {
      border-radius: 2px;
      transform: translate(-50%, -50%) rotate(45deg);
    }
    .map-marker.rail span { transform: rotate(-45deg); }
    .map-marker.port { clip-path: polygon(50% 0%, 100% 35%, 80% 100%, 20% 100%, 0% 35%); border-radius: 0; }
    .map-marker.strong { background: #13795b; }
    .map-marker.workable { background: #946200; }
    .map-marker.watch { background: #b42318; }
    .map-marker.infrastructure { background: #153e75; }
    .map-marker.neutral { background: #66717f; }
    .map-marker.port { background: #0b5066; }
    .map-popup {
      position: absolute;
      left: 16px;
      bottom: 16px;
      width: min(360px, calc(100% - 32px));
      background: #ffffff;
      border: 1px solid var(--border-strong);
      border-radius: 8px;
      padding: 14px;
      box-shadow: 0 12px 30px rgba(22, 32, 43, 0.18);
      z-index: 6;
    }
    .map-popup[hidden] { display: none; }
    .map-popup-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: flex-start;
      margin-bottom: 8px;
    }
    .map-popup h2 { font-size: 18px; margin: 0 0 3px; }
    .map-popup-close {
      border: 0;
      background: var(--panel-soft);
      border-radius: 999px;
      width: 28px;
      height: 28px;
      cursor: pointer;
      font-weight: 900;
    }
    .map-popup ul { margin: 8px 0 10px; padding-left: 18px; }
    .map-popup-actions { display: flex; flex-wrap: wrap; gap: 7px; }
    .map-side-panel {
      display: grid;
      gap: 10px;
    }
    .map-list {
      display: grid;
      gap: 8px;
      max-height: 620px;
      overflow: auto;
      padding-right: 2px;
    }
    .map-list-item {
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--panel);
      padding: 10px;
      box-shadow: var(--shadow);
    }
    .map-list-item button {
      border: 0;
      padding: 0;
      background: transparent;
      color: var(--accent-strong);
      font: inherit;
      font-weight: 800;
      cursor: pointer;
      text-align: left;
    }
    .map-legend {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }
    .legend-item {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      color: var(--muted-strong);
      font-size: 12px;
      font-weight: 800;
    }
    .legend-dot {
      width: 12px;
      height: 12px;
      border-radius: 999px;
      background: var(--accent);
    }
    .legend-dot.site { border-radius: 3px; background: #13795b; }
    .legend-dot.rail { border-radius: 2px; background: #153e75; transform: rotate(45deg); }
    .legend-dot.port { border-radius: 0; clip-path: polygon(50% 0%, 100% 35%, 80% 100%, 20% 100%, 0% 35%); background: #0b5066; }
    .checkbox-row {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      min-height: 38px;
    }
    .checkbox-row label {
      display: inline-flex;
      gap: 5px;
      align-items: center;
      margin: 0;
      text-transform: none;
      font-size: 13px;
      color: var(--text);
    }
    .checkbox-row input {
      width: auto;
      min-height: 0;
    }
    .summary-note {
      margin: 0;
      color: var(--muted);
      max-width: 760px;
    }
    ul.clean {
      margin: 0;
      padding-left: 18px;
    }
    .empty {
      padding: 24px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--muted);
      text-align: center;
      box-shadow: var(--shadow);
    }
    .mobile-label { display: none; }
    @media (max-width: 880px) {
      header { position: static; }
      .page-head, .topbar { flex-direction: column; align-items: stretch; }
      .section-head { flex-direction: column; }
      .actions { justify-content: flex-start; }
      form.grid, .layout, .metrics, .breakdown, .scan-strip, .review-grid, .chain-grid, .map-layout { grid-template-columns: 1fr; }
      form.grid { gap: 12px; }
      .map-shell { min-height: 460px; }
      .chain-flow { grid-template-columns: 1fr; overflow: visible; }
      .flow-step { min-width: 0; }
      .flow-step:not(:last-child)::after { display: none; }
      .mini-flow { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .queue-main { flex-direction: column; }
      .queue-metrics { grid-template-columns: 1fr; }
      .review-form .button { width: 100%; }
      table.responsive-table, .responsive-table thead, .responsive-table tbody, .responsive-table th, .responsive-table td, .responsive-table tr {
        display: block;
      }
      .responsive-table thead { display: none; }
      .responsive-table {
        border: 0;
        background: transparent;
        box-shadow: none;
      }
      .responsive-table tr {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 8px;
        margin-bottom: 10px;
        padding: 10px;
        box-shadow: var(--shadow);
      }
      .responsive-table td {
        border: 0;
        padding: 7px 0;
      }
      .mobile-label {
        display: block;
        color: var(--muted);
        font-size: 12px;
        font-weight: 800;
        text-transform: uppercase;
        margin-bottom: 2px;
      }
      .action-cell, .primary-cell, .wide-cell { min-width: 0; }
      .filters .button, .action-cell .button { width: 100%; }
      .action-stack { width: 100%; }
      .action-stack .button { flex: 1 1 130px; }
    }
  </style>
</head>
<body>
  <header>
    <div class="topbar">
      <div class="brand">OmniMapping Dashboard</div>
